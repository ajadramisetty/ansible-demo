---
- name: NGINX Self-Healing POC (RAW)
  hosts: all
  become: yes
  gather_facts: no
  tasks:
    - name: Apply Self-Healing and Port 8080 Config
      raw: |
        # Update Port to 8080
        sed -i 's/listen 80 default_server;/listen 8080 default_server;/g' /etc/nginx/sites-enabled/default
        sed -i 's/listen \[::\]:80 default_server;/listen [::]:8080 default_server;/g' /etc/nginx/sites-enabled/default
        
        # Create Systemd Healing Override
        mkdir -p /etc/systemd/system/nginx.service.d
        echo -e "[Service]\nRestart=always\nRestartSec=5s" > /etc/systemd/system/nginx.service.d/override.conf
        
        # Reload and Restart
        systemctl daemon-reload
        systemctl restart nginx

