---
- name: NGINX Self-Healing POC
  hosts: all
  become: yes
  tasks:
    - name: Ensure NGINX is installed
      package:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure NGINX to listen on Port 8080
      lineinfile:
        path: /etc/nginx/sites-enabled/default
        regexp: 'listen 80 default_server;'
        line: 'listen 8080 default_server;'
      notify: Restart NGINX

    - name: Also update IPv6 listen port
      lineinfile:
        path: /etc/nginx/sites-enabled/default
        regexp: 'listen \[::\]:80 default_server;'
        line: 'listen [::]:8080 default_server;'
      notify: Restart NGINX

    - name: Create systemd override directory
      file:
        path: /etc/systemd/system/nginx.service.d
        state: directory
        mode: '0755'

    - name: Apply Systemd Auto-Restart configuration
      copy:
        dest: /etc/systemd/system/nginx.service.d/override.conf
        content: |
          [Service]
          Restart=always
          RestartSec=5s
          StartLimitIntervalSec=600
          StartLimitBurst=5
        mode: '0644'
      notify: Reload Systemd

    - name: Ensure NGINX is enabled and running
      systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Verify NGINX is healing on port 8080
      wait_for:
        port: 8080
        timeout: 15

  handlers:
    - name: Reload Systemd
      systemd:
        daemon_reload: yes

    - name: Restart NGINX
      systemd:
        name: nginx
        state: restarted

